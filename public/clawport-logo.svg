<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Stylized claw/port logomark -->
  <rect width="32" height="32" rx="7" fill="currentColor" fill-opacity="0.1"/>
  <!-- Left claw -->
  <path d="M8 20c0-4.4 3.6-8 8-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M8 20l-2-3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M8 20l2-3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right claw -->
  <path d="M24 20c0-4.4-3.6-8-8-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M24 20l-2-3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M24 20l2-3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Port dot -->
  <circle cx="16" cy="22" r="2" fill="currentColor"/>
</svg>
